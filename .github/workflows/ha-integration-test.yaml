name: Home Assistant integration test

on:
  # Only run when this workflow file changes, or when started manually
  push:
    paths:
      - '.github/workflows/ha-integration-test.yaml'
  workflow_dispatch:

jobs:
  test-with-latest-ha:
    runs-on: ubuntu-latest

    env:
      # Test credentials stored as GitHub secrets
      WEBEL_USERNAME: ${{ secrets.WEBEL_USERNAME }}
      WEBEL_PASSWORD: ${{ secrets.WEBEL_PASSWORD }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up test config
        run: |
          mkdir -p ha_config/custom_components

          # Link custom component into Home Assistant config dir
          ln -s $GITHUB_WORKSPACE/custom_components/webel_gctrl ha_config/custom_components/webel_gctrl

          # Minimal configuration.yaml that enables your integration via config flow
          cat > ha_config/configuration.yaml << 'EOF'
          default_config:

          logger:
            default: warning
            logs:
              custom_components.webel_gctrl: debug
          EOF

      - name: Write secrets for test instance
        run: |
          mkdir -p ha_config
          cat > ha_config/secrets.yaml << EOF
          webel_username: ${WEBEL_USERNAME}
          webel_password: ${WEBEL_PASSWORD}
          EOF

      - name: Pre-create webel_gctrl config entry
        run: |
          mkdir -p ha_config/.storage
          cat > ha_config/.storage/core.config_entries << EOF
          {
            "version": 1,
            "minor_version": 1,
            "key": "core.config_entries",
            "data": {
              "entries": [
                {
                  "created_at": "2026-03-08T11:39:37.376733+00:00",
                  "data": {
                    "username": "${WEBEL_USERNAME}",
                    "password": "${WEBEL_PASSWORD}"
                  },
                  "disabled_by": null,
                  "discovery_keys": {},
                  "domain": "webel_gctrl",
                  "entry_id": "ci-webel-gctrl-test",
                  "minor_version": 1,
                  "modified_at": "2024-01-01T00:00:00.000000+00:00",
                  "options": {},
                  "pref_disable_new_entities": false,
                  "pref_disable_polling": false,
                  "source": "user",
                  "subentries": [],
                  "title": "CI Webel G-CTRL Test",
                  "unique_id": null,
                  "version": 1
                }
              ]
            }
          }
          EOF

      - name: Run Home Assistant container with custom component
        run: |
          docker run \
            --name ha_test \
            --rm \
            -v $GITHUB_WORKSPACE/ha_config:/config \
            -e TZ=UTC \
            ghcr.io/home-assistant/home-assistant:2026.3.1 &

          # Wait (up to ~3 minutes) for integration setup and initial state
          echo "Waiting for Webel G-CTRL integration to start and fetch state..."
          for i in $(seq 1 24); do
            logs=$(docker logs ha_test 2>&1 || true)

            if echo "$logs" | grep -q "Webel G-CTRL integration setup complete" && \
               echo "$logs" | grep -q "Initial switch state after first refresh"; then
              echo "Webel G-CTRL integration setup complete and initial state fetched."
              break
            fi

            # If container is running or image is still pulling, keep waiting
            if docker ps --format '{{.Names}}' | grep -q '^ha_test$'; then
              sleep 10
              continue
            fi

            # If container is not running and we don't yet see our messages,
            # keep waiting a bit longer to allow image pull/startup to finish.
            sleep 10
          done

          # Final checks to ensure both messages appeared
          logs=$(docker logs ha_test 2>&1 || true)

          # Show logs and then perform validations
          echo "==== Home Assistant log (tail) ===="
          echo "$logs" | tail -n 500 || true

          if ! echo "$logs" | grep -q "Webel G-CTRL integration setup complete"; then
            echo "Webel G-CTRL integration did not complete setup" >&2
            exit 1
          fi

          if ! echo "$logs" | grep -q "Initial switch state after first refresh"; then
            echo "Webel G-CTRL switch never fetched initial state (no data returned)" >&2
            exit 1
          fi

          # Fail the job if there are Python tracebacks or ERROR entries from your integration
          if echo "$logs" | grep -E "Traceback|ERROR\s+\[custom_components.webel_gctrl"; then
            echo "Integration produced errors in Home Assistant logs" >&2
            exit 1
          fi

          # Optionally also fail on SyntaxWarning from your domain
          if echo "$logs" | grep -E "WARNING\s+\[py.warnings].*custom_components.webel_gctrl"; then
            echo "Integration produced Python warnings" >&2
            exit 1
          fi

          # Stop container if still running
          docker stop ha_test || true
